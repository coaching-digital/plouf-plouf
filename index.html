<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tirage au Sort</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  height: 100vh;
}

.container {
  display: flex;
  width: 100%;
  height: 100vh;
}

/* Colonne gauche */
.left {
  flex: 1.2;
  padding: 40px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

.left h2 {
  margin-top: 0;
}

/* Zone prénoms */
textarea {
  flex: 1;
  width: 100%;
  border-radius: 12px;
  border: none;
  padding: 20px;
  font-size: 18px;
  resize: none;
  margin-bottom: 20px;
}

/* Boutons */
.buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
  transition: 0.2s;
}

#drawBtn { background: #00c853; color: white; }
#resetBtn { background: #2962ff; color: white; }
#removeBtn { background: #d50000; color: white; }

button:hover {
  opacity: 0.9;
  transform: scale(1.02);
}

/* Colonne droite résultat */
.right {
  flex: 0.8;
  background: rgba(0,0,0,0.3);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 60px;
  font-weight: bold;
  text-align: center;
  padding: 20px;
}

#result {
  transition: transform 0.3s ease;
}

.winner {
  transform: scale(1.2);
}

/* Responsive mobile */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .right {
    font-size: 40px;
    min-height: 200px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h2>🎯 Tirage au Sort</h2>

    <textarea id="namesInput" placeholder="Entrez un prénom par ligne..."></textarea>

    <div class="buttons">
      <button id="drawBtn">Lancer</button>
      <button id="resetBtn">Recommencer</button>
      <button id="removeBtn">Sans le tiré</button>
    </div>
  </div>

  <div class="right">
    <div id="result"></div>
  </div>

</div>

<script>
let participants = [];
let lastWinner = null;
let isAnimating = false;

function updateParticipants() {
  const input = document.getElementById("namesInput").value;
  participants = input
    .split("\n")
    .map(name => name.trim())
    .filter(name => name.length > 0);
}

function animateDraw(finalCallback) {
  const resultDiv = document.getElementById("result");
  let iterations = 0;
  isAnimating = true;

  const interval = setInterval(() => {
    const randomIndex = Math.floor(Math.random() * participants.length);
    resultDiv.textContent = participants[randomIndex];
    iterations++;

    if (iterations > 30) {
      clearInterval(interval);
      isAnimating = false;
      finalCallback();
    }
  }, 70);
}

document.getElementById("drawBtn").addEventListener("click", function () {
  if (isAnimating) return;

  updateParticipants();

  if (participants.length === 0) {
    alert("Ajoute au moins un prénom !");
    return;
  }

  const resultDiv = document.getElementById("result");
  resultDiv.classList.remove("winner");

  animateDraw(function () {
    const winnerIndex = Math.floor(Math.random() * participants.length);
    lastWinner = participants[winnerIndex];
    resultDiv.textContent = "🎉 " + lastWinner;
    resultDiv.classList.add("winner");
  });
});

document.getElementById("resetBtn").addEventListener("click", function () {
  if (isAnimating) return;
  document.getElementById("result").textContent = "";
  document.getElementById("result").classList.remove("winner");
});

document.getElementById("removeBtn").addEventListener("click", function () {
  if (isAnimating) return;
  if (!lastWinner) return;

  participants = participants.filter(name => name !== lastWinner);
  document.getElementById("namesInput").value = participants.join("\n");
  document.getElementById("result").textContent = "";
  document.getElementById("result").classList.remove("winner");
  lastWinner = null;
});
</script>

</body>
</html>
