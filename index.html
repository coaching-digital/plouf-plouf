<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tirage au Sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f2f2f5;
  padding: 40px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: #6C4CF1;
  font-size: 32px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.names-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 50px;
  min-height: 60px;
}

.name-tag {
  padding: 12px 20px;
  border-radius: 14px;
  background: white;
  border: 2px solid #e5e5e5;
  font-weight: 500;
  transition: 0.2s;
}

.name-tag.active {
  background: #6C4CF1;
  color: white;
  border-color: #6C4CF1;
  transform: scale(1.12);
  box-shadow: 0 6px 18px rgba(108,76,241,0.4);
}

.card {
  background: white;
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

textarea {
  width: 100%;
  height: 130px;
  border-radius: 16px;
  border: 1px solid #ddd;
  padding: 15px;
  font-size: 16px;
  resize: none;
  margin-bottom: 20px;
  box-sizing: border-box;
}

.primary-btn {
  width: 100%;
  padding: 16px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #6C4CF1, #8E6CFF);
  box-shadow: 0 6px 15px rgba(108,76,241,0.3);
}

.secondary-actions {
  display: flex;
  gap: 12px;
  margin-top: 15px;
}

.secondary-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 16px;
  border: none;
  background: #f2f2f5;
  cursor: pointer;
  font-weight: 500;
}

.result-text {
  text-align: center;
  font-size: 22px;
  margin-top: 25px;
  font-weight: 600;
  color: #444;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 Tirage au sort</h1>

<div class="names-grid" id="namesGrid"></div>

<div class="card">
  <textarea id="namesInput" placeholder="Un prénom par ligne..."></textarea>

  <button class="primary-btn" id="drawBtn">Lancer le tirage</button>

  <div class="secondary-actions">
    <button id="resetBtn">Réinitialiser</button>
    <button id="removeBtn">Sans le tiré</button>
  </div>

  <div class="result-text" id="resultText"></div>
</div>

</div>

<script>
let participants = [];
let lastWinner = null;
let isDrawing = false;

function updateParticipants() {
  const input = document.getElementById("namesInput").value;
  participants = input
    .split("\n")
    .map(n => n.trim())
    .filter(n => n.length > 0);

  renderNames();
}

function renderNames() {
  const grid = document.getElementById("namesGrid");
  grid.innerHTML = "";

  participants.forEach(name => {
    const div = document.createElement("div");
    div.className = "name-tag";
    div.textContent = name;
    grid.appendChild(div);
  });
}

document.getElementById("namesInput").addEventListener("input", updateParticipants);

document.getElementById("drawBtn").addEventListener("click", function () {

  if (isDrawing) return;

  updateParticipants();

  if (participants.length === 0) {
    alert("Ajoute au moins un prénom !");
    return;
  }

  isDrawing = true;

  const tags = document.querySelectorAll(".name-tag");

  let iterations = 0;
  const maxIterations = 15; // 15 tours
  const intervalSpeed = 200; // 200ms -> ~3 secondes total

  const interval = setInterval(() => {
    tags.forEach(tag => tag.classList.remove("active"));

    const randomIndex = Math.floor(Math.random() * tags.length);
    tags[randomIndex].classList.add("active");

    iterations++;

    if (iterations >= maxIterations) {
      clearInterval(interval);

      const winnerIndex = Math.floor(Math.random() * participants.length);

      tags.forEach(tag => tag.classList.remove("active"));
      tags[winnerIndex].classList.add("active");

      lastWinner = participants[winnerIndex];
      document.getElementById("resultText").textContent =
        lastWinner + " a été tiré(e) au sort ! 🎉";

      isDrawing = false;
    }

  }, intervalSpeed);

});

document.getElementById("resetBtn").addEventListener("click", function () {
  if (isDrawing) return;

  document.getElementById("resultText").textContent = "";
  document.querySelectorAll(".name-tag").forEach(tag => {
    tag.classList.remove("active");
  });
});

document.getElementById("removeBtn").addEventListener("click", function () {
  if (!lastWinner || isDrawing) return;

  participants = participants.filter(n => n !== lastWinner);
  document.getElementById("namesInput").value = participants.join("\n");
  updateParticipants();
  document.getElementById("resultText").textContent = "";
});
</script>

</body>
</html>
