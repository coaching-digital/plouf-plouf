<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tirage au Sort</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f2f2f5;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 500px;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Résultat */
.result {
  text-align: center;
  font-size: 34px;
  font-weight: 700;
  margin-bottom: 15px;
  color: #333;
  min-height: 40px;
}

/* Zone texte */
textarea {
  width: 100%;
  height: 160px;
  border-radius: 16px;
  border: 1px solid #e0e0e0;
  padding: 15px;
  font-size: 16px;
  resize: none;
  margin-bottom: 15px;
  box-sizing: border-box;
}

/* Bouton principal */
.primary-btn {
  width: 100%;
  padding: 15px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #6C4CF1, #8E6CFF);
  box-shadow: 0 6px 15px rgba(108,76,241,0.3);
  transition: 0.2s;
}

.primary-btn:hover {
  transform: translateY(-2px);
}

/* Boutons secondaires */
.secondary-actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.secondary-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 14px;
  border: none;
  background: #f2f2f5;
  cursor: pointer;
  font-weight: 500;
}

.winner {
  color: #6C4CF1;
  transform: scale(1.1);
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="app">
  <div class="card">
    <div class="result" id="result">🎯 Tirage au sort</div>

    <textarea id="namesInput" placeholder="Un prénom par ligne..."></textarea>

    <button class="primary-btn" id="drawBtn">Lancer le tirage</button>

    <div class="secondary-actions">
      <button id="resetBtn">Recommencer</button>
      <button id="removeBtn">Sans le tiré</button>
    </div>
  </div>
</div>

<script>
let participants = [];
let lastWinner = null;

function updateParticipants() {
  const input = document.getElementById("namesInput").value;
  participants = input
    .split("\n")
    .map(name => name.trim())
    .filter(name => name.length > 0);
}

document.getElementById("drawBtn").addEventListener("click", function () {
  updateParticipants();

  if (participants.length === 0) {
    alert("Ajoute au moins un prénom !");
    return;
  }

  const resultDiv = document.getElementById("result");
  resultDiv.classList.remove("winner");

  let iterations = 0;
  const interval = setInterval(() => {
    const randomIndex = Math.floor(Math.random() * participants.length);
    resultDiv.textContent = participants[randomIndex];
    iterations++;

    if (iterations > 25) {
      clearInterval(interval);
      const winnerIndex = Math.floor(Math.random() * participants.length);
      lastWinner = participants[winnerIndex];
      resultDiv.textContent = "🎉 " + lastWinner;
      resultDiv.classList.add("winner");
    }
  }, 80);
});

document.getElementById("resetBtn").addEventListener("click", function () {
  document.getElementById("result").textContent = "🎯 Tirage au sort";
  document.getElementById("result").classList.remove("winner");
});

document.getElementById("removeBtn").addEventListener("click", function () {
  if (!lastWinner) return;

  participants = participants.filter(name => name !== lastWinner);
  document.getElementById("namesInput").value = participants.join("\n");
  document.getElementById("result").textContent = "🎯 Tirage au sort";
  document.getElementById("result").classList.remove("winner");
});
</script>

</body>
</html>
